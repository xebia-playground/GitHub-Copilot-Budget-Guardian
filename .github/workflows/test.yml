name: Test Copilot Budget Guardian

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Copilot Budget Guardian
        uses: ./
        with:
          github-token: dummy-token
          enterprise-slug: demo-enterprise
          budget-file: budgets.csv
          dry-run: "true"
          report-format: markdown
          alert-threshold: "80"
          slack-webhook: ""
          teams-webhook: ""