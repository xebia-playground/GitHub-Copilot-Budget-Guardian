name: GitHub Copilot Budget Guardian

description: Enterprise GitHub Action for Copilot Budget Governance, Validation, Reporting, and Alerts.

author: Kuldeep Saini

branding:
  icon: shield
  color: blue

inputs:
  github-token:
    description: GitHub Personal Access Token
    required: true

  enterprise-slug:
    description: GitHub Enterprise Slug
    required: true

  budget-file:
    description: Budget file (CSV)
    required: true

  dry-run:
    description: Preview changes without updating budgets
    required: false
    default: "false"

  report-format:
    description: Report format (markdown | csv | json)
    required: false
    default: "markdown"

  alert-threshold:
    description: Alert threshold percentage
    required: false
    default: "80"

  slack-webhook:
    description: Slack Incoming Webhook URL
    required: false

  teams-webhook:
    description: Microsoft Teams Incoming Webhook URL
    required: false

runs:
  using: node24
  main: dist/index.js
