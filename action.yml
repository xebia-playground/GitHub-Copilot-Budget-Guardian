name: GitHub Copilot Budget Guardian

description: Enterprise GitHub Action for GitHub Copilot budget governance, synchronization, validation, reporting, and notifications.

author: Kuldeep Saini

branding:
  icon: shield
  color: blue

inputs:
  github-token:
    description: GitHub Personal Access Token with Enterprise permissions
    required: true

  enterprise-slug:
    description: GitHub Enterprise slug
    required: true

  budget-file:
    description: Path to the budget CSV file
    required: false
    default: budgets.csv

  dry-run:
    description: Preview changes without updating GitHub Enterprise budgets
    required: false
    default: "false"

  report-format:
    description: Report format (markdown | json | csv)
    required: false
    default: markdown

  alert-threshold:
    description: Budget utilization alert threshold percentage
    required: false
    default: "80"

  slack-webhook:
    description: Slack Incoming Webhook URL
    required: false

  teams-webhook:
    description: Microsoft Teams Incoming Webhook URL
    required: false

outputs:
  created:
    description: Number of budgets created

  updated:
    description: Number of budgets updated

  skipped:
    description: Number of budgets skipped

  failed:
    description: Number of failed budget operations

runs:
  using: node24
  main: dist/index.js