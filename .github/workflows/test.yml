name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build

      - name: Smoke test action with example CSV
        uses: ./
        with:
          github-token: dummy-token
          enterprise-slug: demo-enterprise
          budget-file: examples/budgets.csv
          dry-run: "true"
          report-format: markdown
          alert-threshold: "80"
          slack-webhook: ""
          teams-webhook: ""